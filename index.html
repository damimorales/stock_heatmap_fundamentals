<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d0d0d;color:#e0e0e0;min-height:100vh;padding:16px}
.title{font-size:20px;font-weight:600;color:#fff;margin-bottom:2px}
.subtitle{font-size:12px;color:#555;margin-bottom:14px}
.controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:5px 13px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.btn:hover{background:#222;color:#fff}
.btn.active{background:#1a2a1a;border-color:#2ecc71;color:#2ecc71}
.sep{width:1px;height:18px;background:#2a2a2a;margin:0 2px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:#161616;border:1px solid #222;color:#777;padding:4px 13px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .15s}
.tab:hover{color:#ccc;border-color:#444}
.tab.active{background:#1a2a1a;border-color:#2ecc71;color:#2ecc71}
.sector-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sf{background:#111;border:1px solid #1e1e1e;color:#555;padding:3px 10px;border-radius:12px;cursor:pointer;font-size:11px;transition:all .15s}
.sf.active{border-color:#444;color:#ccc;background:#1e1e1e}
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:#555}
.sort-row select{background:#161616;border:1px solid #2a2a2a;color:#aaa;padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer;outline:none}
.legend{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:11px;color:#444}
.legend-bar{display:flex;gap:2px}
.lseg{width:22px;height:9px;border-radius:2px}
.status-bar{font-size:11px;color:#444;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:3px}
.cell{border-radius:7px;padding:8px 10px;cursor:pointer;transition:transform .12s,filter .12s;min-height:70px;display:flex;flex-direction:column;justify-content:space-between}
.cell:hover{transform:scale(1.05);filter:brightness(1.2);z-index:10;position:relative}
.cell-ticker{font-size:11px;font-weight:700;letter-spacing:.4px}
.cell-name{font-size:9px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cell-val{font-size:17px;font-weight:700;line-height:1;margin-top:4px}
.cell-bot{display:flex;gap:4px;align-items:center;margin-top:2px}
.cell-price{font-size:9px;opacity:.6}
.cell-chg{font-size:9px;font-weight:600}
.tt{position:fixed;background:#191919;border:1px solid #2a2a2a;border-radius:10px;padding:13px 16px;font-size:12px;z-index:1000;pointer-events:none;min-width:215px;display:none}
.tt-head{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px}
.tt-sub{font-size:11px;color:#555;margin-bottom:9px}
.tt-row{display:flex;justify-content:space-between;gap:16px;padding:3px 0;border-bottom:1px solid #1e1e1e}
.tt-row:last-child{border-bottom:none}
.tt-l{color:#666}
.g{color:#2ecc71}.w{color:#f39c12}.b{color:#e74c3c}
</style>
</head>
<body>

<div class="title">🇺🇸 US Market Heatmap</div>
<div class="subtitle">Top 50 · Precios al cierre 24 Mar 2026 · Actualizado por Claude</div>

<div class="controls">
  <button class="btn active" onclick="setSize('equal',this)">Size: Igual</button>
  <button class="btn" onclick="setSize('mktcap',this)">Size: Mkt Cap</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="setMetric('pe',this)">P/E Fwd</div>
  <div class="tab" onclick="setMetric('peg',this)">PEG</div>
  <div class="tab" onclick="setMetric('pfcf',this)">P/FCF</div>
  <div class="tab" onclick="setMetric('ps',this)">P/Sales</div>
  <div class="tab" onclick="setMetric('chg',this)">% Día</div>
</div>

<div class="sort-row">
  <span>Sort:</span>
  <select id="sortSel" onchange="renderGrid()">
    <option value="mktcap">Mkt Cap ↓</option>
    <option value="pe">P/E Fwd ↓</option>
    <option value="peg">PEG ↓</option>
    <option value="chg">% Hoy ↓</option>
    <option value="ticker">Ticker A-Z</option>
  </select>
</div>

<div class="sector-filter" id="sf"></div>

<div class="legend">
  <span>Bajo</span><div class="legend-bar" id="lb"></div><span>Alto</span>
</div>

<div class="status-bar" id="statusTxt">Precios al cierre · 24 Mar 2026</div>
<div class="grid" id="grid"></div>
<div class="tt" id="tt"></div>

  {t:'LMT',  n:'Lockheed',     s:'Industrials', price:468.20, chg:0.60,  mktcap:110,  pe:16,  peg:2.0, pfcf:17,  ps:1.2},
  {t:'UNP',  n:'Union Pacific', s:'Industrials', price:238.40, chg:0.70,  mktcap:145,  pe:19,  peg:2.3, pfcf:21,  ps:5.0},
];

const MC = {
  pe:  {low:4,  high:60, rev:true,  fmt:v=>v==null?'—':v.toFixed(0)+'x', g:12, w:35},
  peg: {low:.1, high:4,  rev:true,  fmt:v=>v==null?'—':v.toFixed(2),     g:1,  w:2.5},
  pfcf:{low:5,  high:80, rev:true,  fmt:v=>v==null?'—':v.toFixed(0)+'x', g:15, w:50},
  ps:  {low:.3, high:20, rev:true,  fmt:v=>v==null?'—':v.toFixed(1)+'x', g:3,  w:12},
  chg: {low:-5, high:5,  rev:false, fmt:v=>v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%', g:2, w:-1},
};

let metric='pe', sizeMode='equal', activeSectors=new Set();

function col(val,cfg){
  if(val==null) return '#1c1c1c';
  const n=Math.max(0,Math.min(1,(val-cfg.low)/(cfg.high-cfg.low)));
  const x=cfg.rev?n:1-n;
  if(x<0.2)  return'#145a32';
  if(x<0.38) return'#1e8449';
  if(x<0.55) return'#7d6608';
  if(x<0.72) return'#922b21';
  return'#641e16';
}

function getSorted(){
  const sel=document.getElementById('sortSel').value;
  let arr=STOCKS.filter(s=>activeSectors.size===0||activeSectors.has(s.s));
  if(sel==='mktcap') arr.sort((a,b)=>b.mktcap-a.mktcap);
  else if(sel==='ticker') arr.sort((a,b)=>a.t.localeCompare(b.t));
  else if(sel==='chg') arr.sort((a,b)=>(b.chg??-999)-(a.chg??-999));
  else arr.sort((a,b)=>(b[sel]??-999)-(a[sel]??-999));
  return arr;
}

function renderGrid(){
  const cfg=MC[metric];
  const arr=getSorted();
  document.getElementById('grid').innerHTML=arr.map(s=>{
    const val=s[metric];
    const bg=col(val,cfg);
    const pr='$'+s.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const cc=s.chg>0?'#2ecc71':s.chg<0?'#e74c3c':'#777';
    const chgStr=(s.chg>0?'+':'')+s.chg.toFixed(2)+'%';
    return`<div class="cell" style="background:${bg}"
      onmouseenter="showTT(event,'${s.t}')" onmouseleave="hideTT()">
      <div><div class="cell-ticker">${s.t}</div><div class="cell-name">${s.n}</div></div>
      <div>
        <div class="cell-val">${cfg.fmt(val)}</div>
        <div class="cell-bot">
          <span class="cell-price">${pr}</span>
          <span class="cell-chg" style="color:${cc}">${chgStr}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderLegend(){
  const cfg=MC[metric];
  document.getElementById('lb').innerHTML=[0,.2,.4,.6,.8,1].map(n=>
    `<div class="lseg" style="background:${col(cfg.low+n*(cfg.high-cfg.low),cfg)}"></div>`
  ).join('');
}

function renderSectors(){
  const secs=[...new Set(STOCKS.map(s=>s.s))].sort();
  document.getElementById('sf').innerHTML=
    `<div class="sf active" onclick="toggleSec('ALL',this)">Todos</div>`+
    secs.map(s=>`<div class="sf" onclick="toggleSec('${s}',this)">${s}</div>`).join('');
}

function toggleSec(s,el){
  if(s==='ALL'){
    activeSectors.clear();
    document.querySelectorAll('.sf').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
  } else {
    document.querySelector('.sf').classList.remove('active');
    el.classList.toggle('active');
    activeSectors.has(s)?activeSectors.delete(s):activeSectors.add(s);
    if(activeSectors.size===0) document.querySelector('.sf').classList.add('active');
  }
  renderGrid();
}

function setMetric(m,el){
  metric=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGrid(); renderLegend();
}

function setSize(m,el){
  sizeMode=m;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function showTT(e,ticker){
  const s=STOCKS.find(x=>x.t===ticker);
  const v=(val,g,w,rev)=>{
    if(val==null) return'<span style="color:#444">N/D</span>';
    const cls=rev?(val<=g?'g':val<=w?'w':'b'):(val>=g?'g':val>=w?'w':'b');
    return`<span class="${cls}">${val}</span>`;
  };
  const cc=s.chg>0?'#2ecc71':s.chg<0?'#e74c3c':'#888';
  document.getElementById('tt').innerHTML=`
    <div class="tt-head">${s.t} · ${s.n}</div>
    <div class="tt-sub">${s.s} · Mkt Cap $${s.mktcap}B</div>
    <div class="tt-row"><span class="tt-l">Precio</span><span>$${s.price.toFixed(2)} <span style="color:${cc}">${s.chg>0?'+':''}${s.chg.toFixed(2)}%</span></span></div>
    <div class="tt-row"><span class="tt-l">P/E Forward</span><span>${v(s.pe,12,35,true)}x</span></div>
    <div class="tt-row"><span class="tt-l">PEG</span><span>${v(s.peg,1,2.5,true)}</span></div>
    <div class="tt-row"><span class="tt-l">P/FCF</span><span>${v(s.pfcf,15,50,true)}x</span></div>
    <div class="tt-row"><span class="tt-l">P/Sales</span><span>${v(s.ps,3,12,true)}x</span></div>
  `;
  document.getElementById('tt').style.display='block';
  moveTT(e);
}

document.addEventListener('mousemove',moveTT);
function moveTT(e){
  const tt=document.getElementById('tt');
  if(tt.style.display!=='block') return;
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-230)+'px';
  tt.style.top=Math.max(4,e.clientY-20)+'px';
}
function hideTT(){ document.getElementById('tt').style.display='none'; }

renderSectors(); renderLegend(); renderGrid();
</script>
</body>
</html>
